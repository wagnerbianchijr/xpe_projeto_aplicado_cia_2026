{% extends "base.html" %}
{% block content %}
<div class="controls">
  <label for="line">Linha:</label>
  <select id="line" name="line_id"
          hx-get="/api/operational" hx-target="#op-table" hx-swap="innerHTML"
          hx-trigger="change">
    <option value="all" {% if line_id == "all" %}selected{% endif %}>Todas</option>
    <option value="1" {% if line_id == "1" %}selected{% endif %}>Linha Sucos 01</option>
    <option value="2" {% if line_id == "2" %}selected{% endif %}>Linha Águas Saborizadas 01</option>
    <option value="3" {% if line_id == "3" %}selected{% endif %}>Linha Chás Gelados 01</option>
  </select>
</div>
<div id="op-table"
     hx-get="/api/operational" hx-trigger="load, refresh-tick from:body"
     hx-include="#line" hx-swap="innerHTML">
  <p class="muted">Carregando…</p>
</div>
{% endblock %}
