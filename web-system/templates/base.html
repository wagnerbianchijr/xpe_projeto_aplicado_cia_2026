<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Serra Clara Bebidas — Painel IIoT</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-main">
      <h1>Serra Clara Bebidas — Painel IIoT</h1>
      <nav>
        <a href="/" class="{{ 'on' if active == 'overview' else '' }}">Visão geral</a>
        <a href="/operational" class="{{ 'on' if active == 'operational' else '' }}">Operational Hub</a>
        <a href="/performance" class="{{ 'on' if active == 'performance' else '' }}">Performance Insights</a>
      </nav>
    </div>
    <div class="topbar-tools">
      <div id="alerts" class="alerts"
           hx-get="/api/alerts" hx-trigger="load, refresh-tick from:body" hx-swap="innerHTML"></div>
      <div class="refresh-control">
        <label for="refresh-rate">Atualização:</label>
        <select id="refresh-rate" data-default="{{ refresh_seconds }}">
          <option value="0">Off</option>
          <option value="5">5s</option>
          <option value="10">10s</option>
          <option value="30">30s</option>
          <option value="60">60s</option>
        </select>
      </div>
    </div>
  </header>

  <section id="kpis" hx-get="/api/kpis" hx-trigger="load, refresh-tick from:body" hx-swap="innerHTML">
    <p class="muted">Carregando indicadores…</p>
  </section>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="/static/refresh.js"></script>
</body>
</html>
