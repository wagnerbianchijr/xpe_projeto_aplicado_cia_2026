name: Infracost

# Estima o custo da mudança de infraestrutura em cada PR e comenta o resultado.
# Também aplica a tagging policy FinOps configurada no Infracost Cloud
# (tags obrigatórias: Service e Environment ∈ {Dev, Stage, Prod}).
#
# Pré-requisito: adicionar o secret INFRACOST_API_KEY no repositório
# (Settings > Secrets and variables > Actions). Pegue a chave em
# https://dashboard.infracost.io > Org Settings.

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/infracost.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  infracost:
    name: Estimativa de custo
    runs-on: ubuntu-latest
    env:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
      # Envia os resultados ao Infracost Cloud (habilita a tagging policy).
      INFRACOST_ENABLE_CLOUD: "true"
    steps:
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Checkout do branch base do PR
        uses: actions/checkout@v4
        with:
          ref: "${{ github.event.pull_request.base.ref }}"

      - name: Gerar baseline de custo (branch base)
        run: |
          infracost breakdown --path=terraform \
            --format=json \
            --out-file=/tmp/infracost-base.json

      - name: Checkout do branch do PR
        uses: actions/checkout@v4

      - name: Diff de custo (PR vs base)
        run: |
          infracost diff --path=terraform \
            --format=json \
            --compare-to=/tmp/infracost-base.json \
            --out-file=/tmp/infracost.json

      - name: Comentar no PR
        run: |
          infracost comment github --path=/tmp/infracost.json \
            --repo=$GITHUB_REPOSITORY \
            --github-token=${{ github.token }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --behavior=update
