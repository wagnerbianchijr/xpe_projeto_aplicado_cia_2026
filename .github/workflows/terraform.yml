name: Terraform CI

# Runs syntax + security checks whenever Terraform code changes.
# NOTE: Actions run AFTER a push completes; they cannot reject the push itself.
# To truly gate merges, enable branch protection requiring these checks (PR flow).
on:
  push:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: terraform

jobs:
  validate:
    name: Syntax & format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Detect Terraform files
        id: detect
        run: |
          if ls *.tf >/dev/null 2>&1; then
            echo "has_tf=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tf=false" >> "$GITHUB_OUTPUT"
            echo "No .tf files yet — skipping validation."
          fi

      - name: Format check
        if: steps.detect.outputs.has_tf == 'true'
        run: terraform fmt -check -recursive -diff

      - name: Init (no backend)
        if: steps.detect.outputs.has_tf == 'true'
        run: terraform init -backend=false -input=false

      - name: Validate
        if: steps.detect.outputs.has_tf == 'true'
        run: terraform validate -no-color

  security:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: terraform
          exit-code: "1"           # fail the check on findings
          severity: CRITICAL,HIGH
          hide-progress: true
